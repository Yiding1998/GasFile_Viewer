name: Gas search validation and Pages deployment

on:
  push:
    branches: [main]
    paths:
      - "GasFile/**"
      - "tools/build_gas_index.py"
      - "gas_file_search.html"
      - "assets/js/**"
      - "garfield_gas_workbench_pro.html"
      - "garfield_gas_workbench_pro_english.html"
      - "garfield_workbench_offline_zh.html"
      - "garfield_workbench_offline_en.html"
      - "index.html"
      - "legacy/**"
      - "garfield_gas_multi_file_viewer_advanced_legend.html"
      - "tools/build_standalone_workbenches.py"
      - "README.md"
      - "README.zh-CN.md"
      - "QUICK_START.md"
      - "Doc/**"
      - "tests/**"
      - ".github/workflows/gas-search.yml"
  pull_request:
    paths:
      - "GasFile/**"
      - "tools/build_gas_index.py"
      - "gas_file_search.html"
      - "assets/js/**"
      - "garfield_gas_workbench_pro.html"
      - "garfield_gas_workbench_pro_english.html"
      - "garfield_workbench_offline_zh.html"
      - "garfield_workbench_offline_en.html"
      - "index.html"
      - "legacy/**"
      - "garfield_gas_multi_file_viewer_advanced_legend.html"
      - "tools/build_standalone_workbenches.py"
      - "README.md"
      - "README.zh-CN.md"
      - "QUICK_START.md"
      - "Doc/**"
      - "tests/**"
      - ".github/workflows/gas-search.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gas-search-pages
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Test index builder
        run: python3 -m unittest discover -s tests -v
      - name: Test shared gas parser against repository files
        run: node tests/test-gas-file-parser.js
      - name: Verify single-file offline workbenches
        run: python3 tools/build_standalone_workbenches.py --check
      - name: Build deployment index from gas files
        run: python3 tools/build_gas_index.py --pretty
      - name: Verify generated index
        run: python3 tools/build_gas_index.py --check
      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - name: Upload generated Pages site
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
